<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>XIUI Chat Demo</title>
  <script src="https://cdn.jsdelivr.net/npm/markdown-it@14.1.0/dist/markdown-it.min.js?ts=20260718"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <style>
    :root { --bg:#0f0f23; --bg2:#1a1a2e; --bg3:#16213e; --text:#e4e4e7; --mute:#a1a1aa; --accent:#667eea; --border:#27272a;
            --xi-bg:#0f0f23; --xi-bg2:#1a1a2e; --xi-text:#e4e4e7; --xi-border:#27272a; --xi-accent:#667eea; --xi-accent2:#7c3aed; --xi-card-bg:#1e1e2f; }
    * { box-sizing: border-box; }
    body { font-family: -apple-system,sans-serif; margin:0; padding:0; background:var(--bg); color:var(--text); min-height:100vh; display:flex; flex-direction:column; }
    .chat-wrap { flex:1; display:flex; flex-direction:column; max-width:900px; margin:0 auto; width:100%; }
    .header { padding:16px 20px; border-bottom:1px solid var(--border); }
    .header h1 { margin:0; font-size:18px; font-weight:600; }
    .header p { margin:4px 0 0; font-size:13px; color:var(--mute); }
    .messages { flex:1; overflow-y:auto; padding:20px; }
    .msg { display:flex; gap:12px; margin-bottom:16px; animation:in .3s ease; }
    @keyframes in { from{opacity:0;transform:translateY(5px)} }
    .msg.user { flex-direction:row-reverse; }
    .msg.user .bubble { background:var(--accent); color:#fff; border-radius:16px 0 16px 16px; }
    .avatar { width:36px; height:36px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:14px; }
    .avatar.ai { background:linear-gradient(135deg,var(--accent),#7c3aed); color:#fff; }
    .avatar.user { background:var(--bg3); color:var(--mute); border:1px solid var(--border); }
    .bubble { max-width:70%; min-width:0; padding:12px 16px; background:var(--bg2); border-radius:0 16px 16px 16px; line-height:1.6; font-size:15px; }
    .msg.user .bubble { max-width:80%; }
    .bubble p { margin:0 0 8px; font-size:inherit; } .bubble p:last-child { margin:0; }
    .bubble pre { background:var(--bg); border-radius:8px; padding:12px; overflow-x:auto; }
    .bubble code { font-size:13px; }
    .bubble table { border-collapse:collapse; width:100%; margin:12px 0; }
    .bubble th { background:var(--bg3); font-weight:600; }
    .bubble th,.bubble td { padding:8px 12px; border:1px solid var(--border); text-align:left; }
    .bubble blockquote { border-left:3px solid var(--accent); margin:8px 0; padding:4px 12px; color:var(--mute); }

    .reasoning-block { margin:8px 0; padding:10px 14px; background:rgba(102,126,234,.06); border-left:3px solid rgba(102,126,234,.3); border-radius:0 8px 8px 0; font-size:13px; }
    .reasoning-block[open] { border-left-color:var(--accent); }
    .reasoning-block summary { cursor:pointer; color:var(--mute); font-size:12px; font-weight:500; outline:none; user-select:none; }
    .reasoning-block summary:hover { color:var(--text); }
    .reasoning-text { margin-top:8px; color:var(--mute); white-space:pre-wrap; line-height:1.5; font-style:italic; }

    .card p { margin:0 0 .5em; }
    .card-choice .opt, .card-choice .opt-disabled { display:block; padding:10px 14px; margin:6px 0; border:1px solid var(--border); border-radius:8px; font-size:14px; }
    .card-choice .opt { cursor:pointer; transition:all .2s; }
    .card-choice .opt:hover { background:rgba(102,126,234,.1); border-color:var(--accent); }
    .card-choice .opt.sel { background:rgba(102,126,234,.15); border-color:var(--accent); }
    .card-tip { background:linear-gradient(135deg,rgba(102,126,234,.1),rgba(124,58,237,.1)); border-left:4px solid var(--accent); }
    .pbar { height:8px; background:var(--bg2); border-radius:4px; margin:8px 0; overflow:hidden; }
    .pfill { height:100%; background:linear-gradient(90deg,var(--accent),#7c3aed); border-radius:4px; transition:width .5s; }
    .card-input { width:100%; padding:12px 16px; border:1px solid var(--border); border-radius:12px; background:var(--bg3); color:var(--text); font-size:15px; outline:none; }
    .card-input:focus { border-color:var(--accent); }
    .slider-wrap { display:flex; align-items:center; gap:12px; margin-top:4px; }
    .card-slider { flex:1; -webkit-appearance:none; appearance:none; height:6px; border-radius:3px; background:var(--bg3); outline:none; margin:8px 0; }
    .card-slider::-webkit-slider-thumb { -webkit-appearance:none; width:20px; height:20px; border-radius:50%; background:var(--accent); cursor:pointer; margin-top:-7px; }
    .card-slider::-moz-range-thumb { width:20px; height:20px; border-radius:50%; background:var(--accent); cursor:pointer; border:none; }
    .slider-val { min-width:32px; text-align:center; font-weight:600; color:var(--accent); font-size:15px; }
    .switch-wrap { display:inline-flex; align-items:center; gap:8px; margin-top:8px; cursor:pointer; }
    .card-toggle { display:none; }
    .switch-track { width:44px; height:24px; border-radius:12px; background:var(--border); position:relative; transition:background .2s; }
    .switch-track::after { content:''; position:absolute; top:2px; left:2px; width:20px; height:20px; border-radius:50%; background:#fff; transition:transform .2s; }
    .card-toggle:checked + .switch-track { background:var(--accent); }
    .card-toggle:checked + .switch-track::after { transform:translateX(20px); }
    .card-invalid { animation:shake .4s; border-color:#ef4444 !important; box-shadow:0 0 0 2px rgba(239,68,68,.15); }
    .card-invalid .opt { border-color:#ef4444; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-4px)} 75%{transform:translateX(4px)} }
    .submitted-tag { display:inline-block; padding:6px 12px; background:rgba(34,197,94,.12); color:#22c55e; border-radius:8px; font-size:13px; font-weight:600; }
    .sum-tbl { width:100%; border-collapse:collapse; }
    .sum-tbl th { padding:8px 12px; text-align:left; font-weight:600; color:var(--mute); font-size:13px; border-bottom:2px solid var(--border); }
    .sum-tbl td { padding:10px 12px; border-bottom:1px solid var(--border); }
    .sum-tbl tbody tr:last-child td { border-bottom:none; }
    .bts { display:flex; gap:12px; margin-top:16px; }
    .btn-pri { flex:1; padding:12px 24px; background:var(--accent); color:#fff; border:none; border-radius:10px; cursor:pointer; font-size:15px; }
    .btn-ghost { flex:1; padding:12px 24px; background:var(--bg3); color:var(--mute); border:1px solid var(--border); border-radius:10px; cursor:pointer; font-size:15px; }
    .btn-submit { background:var(--accent); color:#fff; border:none; padding:12px 32px; border-radius:10px; cursor:pointer; font-size:15px; margin:12px 0; }
    .disabled { pointer-events:none; opacity:.5; }

    .input-area { padding:16px 20px; border-top:1px solid var(--border); background:var(--bg2); }
    .input-bar { display:flex; gap:12px; align-items:flex-end; }
    .input-bar textarea { flex:1; padding:12px 16px; background:var(--bg3); border:1px solid var(--border); border-radius:12px; color:var(--text); font-size:15px; resize:none; min-height:48px; max-height:150px; outline:none; font-family:inherit; }
    .input-bar textarea:focus { border-color:var(--accent); }
    .input-bar button { padding:12px 24px; background:var(--accent); color:#fff; border:none; border-radius:12px; cursor:pointer; font-size:15px; flex-shrink:0; }
    .input-bar button:disabled { opacity:.5; }
    .quick-replies { display:flex; gap:8px; margin-top:12px; overflow-x:auto; }
    .quick-replies button { padding:8px 16px; background:var(--bg3); color:var(--mute); border:1px solid var(--border); border-radius:20px; cursor:pointer; font-size:13px; white-space:nowrap; }
    .quick-replies button:hover { background:rgba(102,126,234,.1); color:var(--text); }
    .status { font-size:12px; color:var(--mute); margin-top:8px; }
    .status.error { color:#ef4444; }
    .status.success { color:#22c55e; }
    .dbg-bar { display:flex; gap:6px; justify-content:flex-end; margin-top:8px; }
    .dbg-btn { padding:2px 10px; background:var(--bg3); color:var(--mute); border:1px solid var(--border); border-radius:6px; cursor:pointer; font-size:11px; }
    .dbg-btn.on { background:rgba(102,126,234,.2); color:var(--accent); border-color:var(--accent); }
  </style>
</head>
<body>
  <div class="chat-wrap">
    <div class="header">
      <h1>AI 学习助手</h1>
      <p>基于 XIUI SDK + 大模型的流式聊天体验</p>
    </div>
    <div class="messages" id="messages"></div>
    <div class="input-area">
      <div class="input-bar">
        <textarea id="input" placeholder="输入消息..." rows="1"></textarea>
        <button id="sendBtn" onclick="console.log('send clicked')">发送</button>
      </div>
      <div class="status" id="status"></div>
      <div class="quick-replies">
        <button data-msg="介绍一下 Python" onclick="console.log('quick clicked:', this.dataset.msg)">介绍一下 Python</button>
        <button data-msg="出个选择题" onclick="console.log('quick clicked:', this.dataset.msg)">出个选择题</button>
        <button data-msg="综合测试" onclick="console.log('quick clicked:', this.dataset.msg)">综合测试</button>
        <button data-msg="确认对话框" onclick="console.log('quick clicked:', this.dataset.msg)">确认对话框</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { XIUIChat } from '../src/index.js';

    console.log('[XIUI] Module loaded');

    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('sendBtn');
    const statusEl = document.getElementById('status');

    const md = markdownit({ html: true, breaks: true, linkify: true, typographer: true, tables: true });

    const API_URL = '/api/chat';
    let chatHistory = [];
    let isSending = false;
    let reasoningEl = null;
    let reasoningDone = false;
    let reasoningText = '';

    // ═══ 一行接入 ═══
    const chat = new XIUIChat({ md });

    // Submit / Confirm → 调用 API（plugin 自闭环，只负责 UI/状态）
    chat._onEvent = async (plugin, event, detail) => {
      if (event !== 'submit') return;
      const formId = plugin.formId;
      const result = chat.submit(formId);
      if (!result.success) return;
      await callAI('用户提交：\n```xiui@submit:' + formId + '\n' + JSON.stringify(result.data) + '\n```');
    };

    function addUserMsg(text) {
      const msg = document.createElement('div');
      msg.className = 'msg user';
      msg.innerHTML = '<div class="avatar user">U</div><div class="bubble"></div>';
      msg.querySelector('.bubble').textContent = text;
      messagesEl.appendChild(msg);
      scrollToBottom();
    }

    function scrollToBottom() { messagesEl.scrollTop = messagesEl.scrollHeight; }

    async function send() {
      const text = inputEl.value.trim();
      if (!text || isSending) return;
      inputEl.value = '';
      addUserMsg(text);
      await callAI(text);
    }

    async function quickSend(text) { inputEl.value = text; await send(); }

    async function callAI(message) {
      isSending = true;
      sendBtn.disabled = true;
      statusEl.textContent = 'AI 思考中...';
      statusEl.className = 'status';

      const stream = chat.createStream(messagesEl);
      const bubble = stream.bubble;

      reasoningEl = null;
      reasoningDone = false;
      reasoningText = '';

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message, history: chatHistory.slice(-10) })
        });
        if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buf = '', aiResponse = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buf += decoder.decode(value, { stream: true });
          const lines = buf.split('\n\n');
          buf = lines.pop() || '';
          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            try {
              const d = JSON.parse(line.slice(6));
              if (d.status === 'thinking') statusEl.textContent = '深度思考中...';
              if (d.reasoning_content) {
                reasoningText += d.reasoning_content;
                if (!reasoningEl) {
                  reasoningEl = document.createElement('details');
                  reasoningEl.className = 'reasoning-block';
                  reasoningEl.innerHTML = '<summary>思考过程</summary><div class="reasoning-text"></div>';
                  bubble.insertBefore(reasoningEl, bubble.firstChild);
                  reasoningEl.open = true;
                }
                reasoningEl.querySelector('.reasoning-text').textContent += d.reasoning_content;
                scrollToBottom();
              }
              if (d.reasoning_end && reasoningEl) {
                reasoningDone = true;
                reasoningEl.open = false;
                reasoningEl.querySelector('summary').textContent = '思考过程（已完成）';
              }
              if (d.content) {
                if (!reasoningDone && reasoningEl) {
                  reasoningDone = true;
                  reasoningEl.open = false;
                  reasoningEl.querySelector('summary').textContent = '思考过程（已完成）';
                }
                aiResponse += d.content;
                chat.feed(d.content);
                statusEl.textContent = '回复中...';
              }
              if (d.done) {
                if (reasoningEl && !reasoningDone) {
                  reasoningDone = true;
                  reasoningEl.open = false;
                  reasoningEl.querySelector('summary').textContent = '思考过程（已完成）';
                }
                chat.flush();
              }
            } catch (e) { console.error('Parse error:', e); }
          }
        }

        chatHistory.push({ role: 'user', content: message });
        chatHistory.push({ role: 'assistant', content: aiResponse });

        // 调试面板
        const rawView = document.createElement('pre');
        rawView.className = 'raw-view';
        rawView.style.cssText = 'display:none;white-space:pre-wrap;word-break:break-word;font-size:13px;margin:8px 0;padding:12px;background:var(--bg);border-radius:8px;font-family:Monaco,monospace;';
        rawView.textContent = aiResponse;
        bubble.appendChild(rawView);
        const dbgBar = document.createElement('div');
        dbgBar.className = 'dbg-bar';
        dbgBar.innerHTML = '<button class="dbg-btn on" data-mode="render">渲染</button><button class="dbg-btn" data-mode="raw">原始</button>';
        bubble.appendChild(dbgBar);
        dbgBar.querySelectorAll('button').forEach(btn => {
          btn.onclick = () => {
            dbgBar.querySelectorAll('button').forEach(b => b.classList.remove('on'));
            btn.classList.add('on');
            const isRaw = btn.dataset.mode === 'raw';
            rawView.style.display = isRaw ? '' : 'none';
            bubble.querySelectorAll('.x-text,.x-card,.reasoning-block,.x-sk,.x-pv').forEach(el => el.style.display = isRaw ? 'none' : '');
          };
        });
        statusEl.textContent = '就绪';
        statusEl.className = 'status success';
      } catch (error) {
        console.error('API error:', error);
        statusEl.textContent = '连接失败，请检查后端服务';
        statusEl.className = 'status error';
        bubble.innerHTML = '<div style="color:#ef4444">连接失败，请检查后端服务是否启动。</div>';
      } finally {
        isSending = false;
        sendBtn.disabled = false;
      }
    }

    inputEl.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
    });

    async function init() {
      sendBtn.addEventListener('click', send);
      document.querySelectorAll('.quick-replies button').forEach(btn => {
        btn.addEventListener('click', () => quickSend(btn.dataset.msg));
      });

      chat.createStream(messagesEl);
      const welcome = [
        '👋 你好！我是你的 AI 学习助手。', '',
        '我可以帮助你学习编程知识，包括：',
        '- **Python** 基础与进阶',
        '- **前端开发** (HTML/CSS/JS)',
        '- **算法与数据结构**', '',
        '> 💡 点击下方快捷按钮开始体验，或输入你想问的问题！'
      ];
      const textContent = welcome.join('\n');
      let i = 0;
      const tick = () => {
        if (i >= textContent.length) return;
        chat.feed(textContent[i]); i++;
        setTimeout(tick, 30 + Math.random() * 20);
      };
      tick();

      try {
        const res = await fetch('/api/health');
        if (res.ok) { statusEl.textContent = '后端服务已连接'; statusEl.className = 'status success'; }
      } catch (e) { statusEl.textContent = '后端服务未启动'; statusEl.className = 'status error'; }
    }

    init();
  </script>
</body>
</html>
