<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>XIUI Chat Demo</title>
  <script src="https://cdn.jsdelivr.net/npm/markdown-it@14.1.0/dist/markdown-it.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <style>
    :root { --bg:#0f0f23; --bg2:#1a1a2e; --bg3:#16213e; --text:#e4e4e7; --mute:#a1a1aa; --accent:#667eea; --border:#27272a; }
    * { box-sizing: border-box; }
    body { font-family: -apple-system,sans-serif; margin:0; padding:0; background:var(--bg); color:var(--text); min-height:100vh; display:flex; flex-direction:column; }
    .chat-wrap { flex:1; display:flex; flex-direction:column; max-width:900px; margin:0 auto; width:100%; }
    .header { padding:16px 20px; border-bottom:1px solid var(--border); }
    .header h1 { margin:0; font-size:18px; font-weight:600; }
    .header p { margin:4px 0 0; font-size:13px; color:var(--mute); }
    .messages { flex:1; overflow-y:auto; padding:20px; }
    .msg { display:flex; gap:12px; margin-bottom:16px; animation:in .3s ease; }
    @keyframes in { from{opacity:0;transform:translateY(5px)} }
    .msg.user { flex-direction:row-reverse; }
    .msg.user .bubble { background:var(--accent); color:#fff; border-radius:16px 0 16px 16px; }
    .avatar { width:36px; height:36px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:14px; }
    .avatar.ai { background:linear-gradient(135deg,var(--accent),#7c3aed); color:#fff; }
    .avatar.user { background:var(--bg3); color:var(--mute); border:1px solid var(--border); }
    .bubble { max-width:70%; min-width:0; padding:12px 16px; background:var(--bg2); border-radius:0 16px 16px 16px; line-height:1.6; font-size:15px; }
    .msg.user .bubble { max-width:80%; }
    .bubble p { margin:0 0 8px; } .bubble p:last-child { margin:0; }
    .bubble pre { background:var(--bg); border-radius:8px; padding:12px; overflow-x:auto; }
    .bubble code { font-size:13px; }
    .bubble table { border-collapse:collapse; }
    .bubble th,.bubble td { padding:6px 12px; border:1px solid var(--border); }
    .bubble blockquote { border-left:3px solid var(--accent); margin:8px 0; padding:4px 12px; color:var(--mute); }

    .sk { display:flex; align-items:center; gap:12px; padding:20px; margin:12px 0; border:1px solid var(--border); border-radius:12px; opacity:.5; animation:pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:.8} }
    .sk-l { flex:1; height:12px; background:var(--border); border-radius:4px; }
    .pv { padding:12px 16px; margin:12px 0; border:1px dashed var(--border); border-radius:12px; line-height:1.6; font-size:14px; }
    .cursor { display:inline-block; width:2px; height:1.2em; background:var(--accent); vertical-align:text-bottom; animation:blink 1s step-end infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    .card { background:#1e1e2f; border:1px solid var(--border); border-radius:12px; padding:16px; margin:12px 0; }
    .card-choice .opt, .card-choice .opt-disabled { display:block; padding:10px 14px; margin:6px 0; border:1px solid var(--border); border-radius:8px; font-size:14px; }
    .card-choice .opt { cursor:pointer; transition:all .2s; }
    .card-choice .opt:hover { background:rgba(102,126,234,.1); border-color:var(--accent); }
    .card-choice .opt.sel { background:rgba(102,126,234,.15); border-color:var(--accent); }
    .card-tip { background:linear-gradient(135deg,rgba(102,126,234,.1),rgba(124,58,237,.1)); border-left:4px solid var(--accent); }
    .pbar { height:8px; background:var(--bg2); border-radius:4px; margin:8px 0; overflow:hidden; }
    .pfill { height:100%; background:linear-gradient(90deg,var(--accent),#7c3aed); border-radius:4px; transition:width .5s; }
    .card-input { width:100%; padding:12px 16px; border:1px solid var(--border); border-radius:12px; background:var(--bg3); color:var(--text); font-size:15px; outline:none; }
    .card-input:focus { border-color:var(--accent); }
    .sum-tbl { width:100%; border-collapse:collapse; }
    .sum-tbl td { padding:10px 12px; border-bottom:1px solid var(--border); }
    .sum-tbl tr:last-child td { border-bottom:none; }
    .bts { display:flex; gap:12px; margin-top:16px; }
    .btn-pri { flex:1; padding:12px 24px; background:var(--accent); color:#fff; border:none; border-radius:10px; cursor:pointer; font-size:15px; }
    .btn-ghost { flex:1; padding:12px 24px; background:var(--bg3); color:var(--mute); border:1px solid var(--border); border-radius:10px; cursor:pointer; font-size:15px; }
    .btn-submit { background:var(--accent); color:#fff; border:none; padding:12px 32px; border-radius:10px; cursor:pointer; font-size:15px; margin:12px 0; }
    .disabled { pointer-events:none; opacity:.5; }

    .input-area { padding:16px 20px; border-top:1px solid var(--border); background:var(--bg2); }
    .input-bar { display:flex; gap:12px; align-items:flex-end; }
    .input-bar textarea { flex:1; padding:12px 16px; background:var(--bg3); border:1px solid var(--border); border-radius:12px; color:var(--text); font-size:15px; resize:none; min-height:48px; max-height:150px; outline:none; font-family:inherit; }
    .input-bar textarea:focus { border-color:var(--accent); }
    .input-bar button { padding:12px 24px; background:var(--accent); color:#fff; border:none; border-radius:12px; cursor:pointer; font-size:15px; flex-shrink:0; }
    .input-bar button:disabled { opacity:.5; }
    .quick-replies { display:flex; gap:8px; margin-top:12px; overflow-x:auto; }
    .quick-replies button { padding:8px 16px; background:var(--bg3); color:var(--mute); border:1px solid var(--border); border-radius:20px; cursor:pointer; font-size:13px; white-space:nowrap; }
    .quick-replies button:hover { background:rgba(102,126,234,.1); color:var(--text); }
    .status { font-size:12px; color:var(--mute); margin-top:8px; }
    .status.error { color:#ef4444; }
    .status.success { color:#22c55e; }
  </style>
</head>
<body>
  <div class="chat-wrap">
    <div class="header">
      <h1>AI 学习助手</h1>
      <p>基于 XIUI SDK + 大模型的流式聊天体验</p>
    </div>
    <div class="messages" id="messages"></div>
    <div class="input-area">
      <div class="input-bar">
        <textarea id="input" placeholder="输入消息..." rows="1"></textarea>
        <button id="sendBtn">发送</button>
      </div>
      <div class="status" id="status"></div>
      <div class="quick-replies">
        <button data-msg="介绍一下 Python">介绍一下 Python</button>
        <button data-msg="出个选择题">出个选择题</button>
        <button data-msg="综合测试">综合测试</button>
        <button data-msg="确认对话框">确认对话框</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { XIUIChat, XIUIPlugin } from '../src/index.js';

    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('sendBtn');
    const statusEl = document.getElementById('status');
    const md = markdownit({ html: true, breaks: true, tables: true });

    const API_URL = '/api/chat';
    let chatHistory = [];
    let isSending = false;

    function mkmd(t) {
      let h = md.render(t);
      h = h.replace(/\$\$(.+?)\$\$/g, (_,f) => {
        try { const s=document.createElement('span'); katex.render(f.trim(),s,{throwOnError:false}); return s.innerHTML; }
        catch { return `<code>${f}</code>`; }
      });
      return h.trim();
    }
    const noP = s => mkmd(s).replace(/<\/?p>/g,'');

    let currentChat = null;
    let currentBubble = null;

    const cardDefs = {
      choice: {
        render(card, el) {
          const d = card.data || {};
          el.innerHTML = mkmd(d.question || '') + (d.options || []).map(o =>
            `<span class="opt" data-id="${o.id}">${noP(o.label)}</span>`).join('');
          el.querySelectorAll('.opt').forEach(o => o.onclick = () => {
            if (currentChat.isSubmitted()) return;
            el.querySelectorAll('.opt').forEach(x => x.classList.remove('sel'));
            o.classList.add('sel');
            card.setValue(o.dataset.id);
          });
        }
      },
      tip: {
        render(card, el) { el.innerHTML = mkmd((card.data||{}).body||''); }
      },
      progress: {
        render(card, el) {
          const d = card.data||{};
          el.innerHTML = `${mkmd((d.title||'')+' '+(d.label||''))}<div class="pbar"><div class="pfill" style="width:${(d.progress||0)*100}%"></div></div>`;
        }
      },
      input: {
        render(card, el) {
          const d = card.data||{};
          el.innerHTML = `${mkmd(d.title||'')}<input class="card-input" placeholder="${d.placeholder||''}">`;
          el.querySelector('input').oninput = e => card.setValue(e.target.value);
        }
      },
      submit: {
        render(card, el) {
          el.innerHTML = `<button class="btn-submit">${(card.data||{}).label||'提交'}</button>`;
          el.querySelector('button').onclick = async () => {
            if (currentChat.isSubmitted()) return;
            const formId = card.formId;
            const result = currentChat.submit(formId);
            if (!result.success) {
              if (result.error === 'incomplete') {
                alert(`请完成所有题目（未完成：${result.missing.join(', ')}）`);
              }
              return;
            }
            currentBubble.querySelectorAll('.opt,.btn-submit,.btn-pri,.btn-ghost,.card-input').forEach(x => x.classList.add('disabled'));
            const submitMsg = `\`\`\`submit\n${JSON.stringify(result.data)}\n\`\`\``;
            await callAI(submitMsg, result.cards);
          };
        }
      },
      summary: {
        render(card, el) {
          el.innerHTML = `<table class="sum-tbl">${((card.data||{}).items||[]).map(i => `<tr><td>${i.label}</td><td>${i.value}</td></tr>`).join('')}</table>`;
        }
      },
      confirm: {
        render(card, el) {
          const d = card.data||{};
          el.innerHTML = `${mkmd(d.title||'')}${mkmd(d.description||'')}<div class="bts"><button class="btn-pri">${d.confirmLabel||'确认'}</button><button class="btn-ghost">${d.cancelLabel||'取消'}</button></div>`;
          el.querySelector('.btn-pri').onclick = () => { card.setValue('confirm'); addUserMsg('确认提交'); };
          el.querySelector('.btn-ghost').onclick = () => { card.setValue('cancel'); addUserMsg('取消提交'); };
        }
      }
    };

    function addUserMsg(text) {
      const msg = document.createElement('div');
      msg.className = 'msg user';
      msg.innerHTML = '<div class="avatar user">U</div><div class="bubble"></div>';
      msg.querySelector('.bubble').textContent = text;
      messagesEl.appendChild(msg);
      chatHistory.push({ role: 'user', content: text });
      scrollToBottom();
    }

    function addAIMsg() {
      const msg = document.createElement('div');
      msg.className = 'msg';
      msg.innerHTML = '<div class="avatar ai">AI</div><div class="bubble"></div>';
      messagesEl.appendChild(msg);
      currentBubble = msg.querySelector('.bubble');
      scrollToBottom();
      return currentBubble;
    }

    function scrollToBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function createChat(bubble) {
      currentChat = new XIUIChat({
        cards: cardDefs,
        autoFlush: 2000,
        onText: t => {
          let tb = bubble.querySelector('.text-block');
          if (!tb) { tb = document.createElement('div'); tb.className = 'text-block'; bubble.appendChild(tb); }
          tb.innerHTML = mkmd(t); scrollToBottom();
        },
        onCardBegin: () => {
          const skeleton = document.createElement('div');
          skeleton.className = 'sk';
          skeleton.innerHTML = '<div class="sk-l"></div><div class="sk-l" style="width:60%"></div>';
          bubble.appendChild(skeleton);
          scrollToBottom();
        },
        onCardUpdate: t => {
          const sk = bubble.querySelector('.sk');
          if (sk) sk.remove();
          let pv = bubble.querySelector('.pv');
          if (!pv) { pv = document.createElement('div'); pv.className = 'pv'; bubble.appendChild(pv); }
          pv.innerHTML = mkmd(t); scrollToBottom();
        },
        onCard: (card, el) => {
          const sk = bubble.querySelector('.sk');
          const pv = bubble.querySelector('.pv');
          if (sk) sk.remove();
          if (pv) pv.remove();
          bubble.appendChild(el); scrollToBottom();
        },
        onDone: () => {
          const sk = bubble.querySelector('.sk');
          const pv = bubble.querySelector('.pv');
          if (sk) sk.remove();
          if (pv) pv.remove();
        }
      });
      return currentChat;
    }

    async function send() {
      const text = inputEl.value.trim();
      if (!text || isSending) return;
      inputEl.value = '';
      addUserMsg(text);
      await callAI(text);
    }

    async function quickSend(text) {
      inputEl.value = text;
      await send();
    }

    async function callAI(message, cardData = {}) {
      isSending = true;
      sendBtn.disabled = true;
      statusEl.textContent = 'AI 思考中...';
      statusEl.className = 'status';

      const bubble = addAIMsg();
      const chat = createChat(bubble);

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            message,
            history: chatHistory.slice(-10),
            cardData
          })
        });

        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        let aiResponse = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n\n');
          buffer = lines.pop() || '';

          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            try {
              const data = JSON.parse(line.slice(6));
              if (data.content) {
                console.log('[XIUI SSE]', data.content);
                aiResponse += data.content;
                chat.feed(data.content);
              }
              if (data.done) {
                chat.flush();
              }
            } catch (e) {
              console.error('Parse error:', e);
            }
          }
        }

        chatHistory.push({ role: 'user', content: message });
        chatHistory.push({ role: 'assistant', content: aiResponse });
        statusEl.textContent = '就绪';
        statusEl.className = 'status success';

      } catch (error) {
        console.error('API error:', error);
        statusEl.textContent = '连接失败，请检查后端服务';
        statusEl.className = 'status error';
        bubble.innerHTML = '<div style="color:#ef4444">连接失败，请检查后端服务是否启动。</div>';
      } finally {
        isSending = false;
        sendBtn.disabled = false;
      }
    }

    inputEl.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    });

    async function init() {
      sendBtn.addEventListener('click', send);
      document.querySelectorAll('.quick-replies button').forEach(btn => {
        btn.addEventListener('click', () => quickSend(btn.dataset.msg));
      });

      const bubble = addAIMsg();
      const chat = createChat(bubble);

      const welcome = [
        '👋 你好！我是你的 AI 学习助手。',
        '',
        '我可以帮助你学习编程知识，包括：',
        '- **Python** 基础与进阶',
        '- **前端开发** (HTML/CSS/JS)',
        '- **算法与数据结构**',
        '',
        '```card:tip:welcome',
        '> 💡 点击下方快捷按钮开始体验，或输入你想问的问题！',
        '```'
      ];

      let i = 0;
      const textContent = welcome.join('\n');
      const tick = () => {
        if (i >= textContent.length) return;
        chat.feed(textContent[i]);
        i++;
        setTimeout(tick, 30 + Math.random() * 20);
      };
      tick();

      try {
        const res = await fetch('/api/health');
        if (res.ok) {
          statusEl.textContent = '后端服务已连接';
          statusEl.className = 'status success';
        }
      } catch (e) {
        statusEl.textContent = '后端服务未启动';
        statusEl.className = 'status error';
      }
    }

    init();
  </script>
</body>
</html>
