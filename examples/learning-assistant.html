<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>XIUI 学习助手示例</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui; max-width: 800px; margin: 0 auto; padding: 20px; background: #f5f5f5; }
    .chat-container { background: white; border-radius: 12px; padding: 20px; min-height: 60vh; }
    .message { margin: 12px 0; }
    .message.user { text-align: right; }
    .message.user .bubble { background: #667eea; color: white; display: inline-block; padding: 8px 16px; border-radius: 12px; max-width: 70%; }
    .message.assistant .bubble { background: #f0f0f0; display: inline-block; padding: 8px 16px; border-radius: 12px; max-width: 85%; }
    .card { border: 1px solid #e0e0e0; border-radius: 8px; padding: 16px; margin: 12px 0; background: white; }
    .card-choice .option { display: block; padding: 10px 14px; margin: 6px 0; border: 1px solid #ddd; border-radius: 6px; cursor: pointer; transition: all 0.2s; }
    .card-choice .option:hover { background: #f0f4ff; border-color: #667eea; }
    .card-choice .option.selected { background: #e0e8ff; border-color: #667eea; font-weight: 500; }
    .card-tip { background: #f8f9ff; border-left: 4px solid #667eea; }
    .card-input input, .card-input textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
    .card-progress .bar { height: 8px; background: #e0e0e0; border-radius: 4px; margin: 8px 0; overflow: hidden; }
    .card-progress .fill { height: 100%; border-radius: 4px; transition: width 0.5s ease; }
    .card-summary { display: inline-block; padding: 12px 20px; text-align: center; border-radius: 8px; background: #f8f9ff; margin: 4px; }
    .card-summary .value { font-size: 22px; font-weight: bold; color: #667eea; }
    .card-summary .trend-up { color: #22c55e; }
    .card-summary .trend-down { color: #ef4444; }
    .btn-submit { background: #667eea; color: white; border: none; padding: 10px 28px; border-radius: 8px; cursor: pointer; font-size: 15px; margin: 8px 0; }
    .btn-submit:hover { background: #5a6fd6; }
    .skeleton { height: 60px; background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 8px; margin: 12px 0; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    #input-area { display: flex; gap: 8px; margin-top: 16px; }
    #input-area input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; }
    #input-area button { padding: 12px 24px; background: #667eea; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 15px; }
  </style>
</head>
<body>
  <h2>🤖 XIUI 学习助手</h2>
  <div class="chat-container" id="chat"></div>
  <div id="input-area">
    <input type="text" id="user-input" placeholder="输入你的问题..." onkeydown="if(event.key==='Enter')sendMessage()" />
    <button onclick="sendMessage()">发送</button>
  </div>

  <script type="module">
    import { Parser, Renderer, Collector } from '../src/index.js';

    const chat = document.getElementById('chat');
    const collector = new Collector();

    class ChatRenderer extends Renderer {
      onCardStart(type, id) {
        const skeleton = document.createElement('div');
        skeleton.className = 'skeleton';
        skeleton.id = `sk-${id}`;
        this._appendToBubble(skeleton);
      }

      onCardEnd(card, lines) {
        const data = Renderer.extractData(card, lines);
        const el = this._buildCard(card, data);
        const sk = document.getElementById(`sk-${card.id}`);
        if (sk) sk.replaceWith(el);
        else this._appendToBubble(el);

        // 绑定交互
        if (card.type === 'choice') {
          el.querySelectorAll('.option').forEach(opt => {
            opt.addEventListener('click', () => {
              el.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
              opt.classList.add('selected');
              collector.onChoiceSelect(card.id, opt.dataset.id);
            });
          });
        } else if (card.type === 'input') {
          el.querySelector('input, textarea')?.addEventListener('input', e =>
            collector.onInput(card.id, e.target.value));
        } else if (card.type === 'confirm') {
          el.querySelector('.btn-yes')?.addEventListener('click', () => collector.onConfirm(card.id, 'yes'));
          el.querySelector('.btn-no')?.addEventListener('click', () => collector.onConfirm(card.id, 'no'));
        }
      }

      onMarkdownLine(line) {
        if (!line.trim()) return;
        const p = document.createElement('div');
        p.textContent = line;
        this._appendToBubble(p);
      }

      onSubmitCard(card) {
        const btn = document.createElement('button');
        btn.className = 'btn-submit';
        btn.textContent = card.attrs.label || '提交';
        btn.addEventListener('click', () => {
          const { valid, errors } = collector.build(card.id, parser.pendingCards);
          if (!valid) {
            alert(`请完成：${errors.join(', ')}`);
            return;
          }
          collector.reset();
          parser.pendingCards = [];
          btn.disabled = true;
          btn.textContent = '已提交 ✓';
          // 在实际应用中，这里会调用 chat.submitCards()
        });
        this._appendToBubble(btn);
      }

      _appendToBubble(el) {
        let bubble = chat.querySelector('.bubble-assistant.current');
        if (!bubble) {
          const wrapper = document.createElement('div');
          wrapper.className = 'message assistant';
          bubble = document.createElement('div');
          bubble.className = 'bubble bubble-assistant current';
          wrapper.appendChild(bubble);
          chat.appendChild(wrapper);
        }
        bubble.appendChild(el);
      }

      _buildCard(card, data) {
        const el = document.createElement('div');
        el.className = `card card-${card.type}`;

        switch (card.type) {
          case 'choice':
            el.innerHTML = `<p><strong>${data.question}</strong></p>${data.options.map(o =>
              `<span class="option" data-id="${o.id}">${o.id}. ${o.label}</span>`).join('')}`;
            break;
          case 'tip':
            el.innerHTML = `<strong>${data.title}</strong><br>${data.body.replace(/\n/g, '<br>')}`;
            break;
          case 'input':
            el.innerHTML = `<p><strong>${data.title}</strong></p><${card.attrs.type === 'multiline' ? 'textarea rows="3"' : 'input type="text"'} placeholder="${data.placeholder || ''}">`;
            break;
          case 'progress':
            el.innerHTML = `<p><strong>${data.title}</strong> <small>${data.label}</small></p>
              <div class="bar"><div class="fill" style="width:${data.progress * 100}%;background:${card.attrs.color === 'green' ? '#22c55e' : card.attrs.color === 'orange' ? '#f59e0b' : card.attrs.color === 'red' ? '#ef4444' : '#667eea'}"></div></div>`;
            break;
          case 'summary': {
            const trendIcon = card.attrs.trend === 'up' ? '↑' : card.attrs.trend === 'down' ? '↓' : '→';
            const trendClass = card.attrs.trend === 'up' ? 'trend-up' : card.attrs.trend === 'down' ? 'trend-down' : '';
            el.innerHTML = `<div class="value">${data.value} <span class="${trendClass}">${trendIcon}</span></div>
              <small>${data.title}</small>${data.subtitle ? `<br><small>${data.subtitle}</small>` : ''}`;
            break;
          }
          case 'confirm':
            el.innerHTML = `<p><strong>${data.title}</strong></p><p>${data.description || ''}</p>
              <button class="btn-yes btn-submit" style="margin-right:8px">${data.confirmLabel}</button>
              <button class="btn-no btn-submit" style="background:#e0e0e0;color:#333">${data.cancelLabel}</button>`;
            break;
        }

        return el;
      }
    }

    const renderer = new ChatRenderer();
    const parser = new Parser(renderer);
    window.parser = parser;
    window.collector = collector;

    // 模拟一轮教学对话
    const demo = [
      '你好！今天我们来学习 Python 的可变类型和不可变类型。',
      '',
      '<!-- card:choice:c1 -->',
      '下面哪个是可变类型？',
      '- A. 整数 int',
      '- B. 字符串 str',
      '- C. 列表 list',
      '- D. 元组 tuple',
      '<!-- /card -->',
      '',
      '<!-- card:choice:c2[@optional:true] -->',
      '下面哪个是引用传递？（选做）',
      '- A. 整数 int',
      '- B. 列表 list',
      '<!-- /card -->',
      '',
      '<!-- card:submit:s1 -->',
      '提交',
      '<!-- /card -->',
    ];

    let i = 0;
    const timer = setInterval(() => {
      if (i >= demo.length) {
        clearInterval(timer);
        // 结束当前气泡
        const cur = chat.querySelector('.bubble-assistant.current');
        if (cur) cur.classList.remove('current');
        return;
      }
      parser.feed(demo[i]);
      i++;
    }, 150);

    window.sendMessage = function() {
      const input = document.getElementById('user-input');
      const text = input.value.trim();
      if (!text) return;

      const wrapper = document.createElement('div');
      wrapper.className = 'message user';
      wrapper.innerHTML = `<div class="bubble">${text}</div>`;
      chat.appendChild(wrapper);
      input.value = '';

      // 结束当前模型气泡
      const cur = chat.querySelector('.bubble-assistant.current');
      if (cur) cur.classList.remove('current');
    };
  </script>
</body>
</html>
