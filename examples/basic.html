<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>XIUI 基础示例</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --bg-primary: #0f0f23;
      --bg-secondary: #1a1a2e;
      --bg-tertiary: #16213e;
      --text-primary: #e4e4e7;
      --text-secondary: #a1a1aa;
      --accent: #667eea;
      --accent-hover: #7c8eea;
      --border: #27272a;
      --card-bg: #1e1e2f;
    }

    * { box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 20px;
    }

    .header .logo {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--accent), #7c3aed);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: bold;
      color: white;
    }

    .header h1 {
      margin: 0;
      font-size: 20px;
      font-weight: 600;
    }

    .header .badge {
      margin-left: auto;
      padding: 4px 12px;
      background: var(--bg-tertiary);
      border-radius: 20px;
      font-size: 12px;
      color: var(--text-secondary);
    }

    #output {
      flex: 1;
      overflow-y: auto;
      padding: 10px 0;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    #output::-webkit-scrollbar { width: 6px; }
    #output::-webkit-scrollbar-track { background: transparent; }
    #output::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .message {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

    .message .avatar {
      width: 36px;
      height: 36px;
      border-radius: 9999px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .message.assistant .avatar {
      background: linear-gradient(135deg, var(--accent), #7c3aed);
      color: white;
    }

    .message.user .avatar {
      background: var(--bg-tertiary);
      color: var(--text-secondary);
    }

    .message .content {
      flex: 1;
      min-width: 0;
    }

    .message .text {
      padding: 12px 16px;
      border-radius: 16px;
      line-height: 1.6;
      font-size: 15px;
    }

    .message.assistant .text {
      background: var(--bg-secondary);
      border-radius: 0 16px 16px 16px;
    }

    .message.user .text {
      background: var(--accent);
      color: white;
      border-radius: 16px 0 16px 16px;
      margin-left: auto;
      max-width: 80%;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      margin: 12px 0;
      transition: all 0.2s ease;
    }

    .card:hover { border-color: var(--accent); }

    .card-choice .option {
      display: block;
      padding: 10px 14px;
      margin: 6px 0;
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
      font-size: 14px;
    }

    .card-choice .option:hover {
      background: rgba(102, 126, 234, 0.1);
      border-color: rgba(102, 126, 234, 0.3);
    }

    .card-choice .option.selected {
      background: rgba(102, 126, 234, 0.15);
      border-color: var(--accent);
    }

    .card-tip {
      background: linear-gradient(135deg, rgba(102, 126, 234, 0.1), rgba(124, 58, 237, 0.1));
      border-left: 4px solid var(--accent);
      padding-left: 20px;
    }

    .card-submit button {
      background: linear-gradient(135deg, var(--accent), #7c3aed);
      color: white;
      border: none;
      padding: 12px 32px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 500;
      transition: all 0.2s ease;
    }

    .card-submit button:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
    }

    .card-progress .bar {
      height: 8px;
      background: var(--bg-secondary);
      border-radius: 4px;
      margin: 8px 0;
      overflow: hidden;
    }

    .card-progress .fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), #7c3aed);
      border-radius: 4px;
      transition: width 0.5s ease;
    }

    .card-preview {
      background: var(--card-bg);
      border: 1px dashed var(--border);
      border-radius: 12px;
      padding: 16px;
      margin: 12px 0;
      transition: all 0.3s ease;
    }

    .card-preview .card-line {
      line-height: 1.6;
      margin-bottom: 4px;
      opacity: 0.8;
    }

    #input-area {
      display: flex;
      gap: 10px;
      margin-top: 20px;
      padding: 16px;
      background: var(--bg-secondary);
      border-radius: 16px;
      border: 1px solid var(--border);
    }

    #input-area input {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--bg-tertiary);
      color: var(--text-primary);
      font-size: 15px;
      outline: none;
    }

    #input-area input:focus { border-color: var(--accent); }
    #input-area input::placeholder { color: var(--text-secondary); }

    #input-area button {
      padding: 12px 24px;
      background: linear-gradient(135deg, var(--accent), #7c3aed);
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 500;
      transition: all 0.2s ease;
    }

    #input-area button:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
    }

    .cursor {
      display: inline-block;
      width: 2px;
      height: 1.2em;
      background: var(--accent);
      vertical-align: text-bottom;
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">X</div>
      <h1>XIUI 基础示例</h1>
      <span class="badge">v1.0.0</span>
    </div>
    <div id="output"></div>
    <div id="input-area">
      <input type="text" id="user-input" placeholder="输入消息..." />
      <button onclick="sendMessage()">发送</button>
    </div>
  </div>

  <script type="module">
    import { Parser, Renderer, Collector } from '../src/index.js';

    const output = document.getElementById('output');
    const collector = new Collector();

    class DOMRenderer extends Renderer {
      constructor() {
        super();
        this.messageEl = null;
        this.contentEl = null;
        this.markdownBuffer = [];
        this.inCard = false;
        this.currentCardContainer = null;
        this.cardLines = [];
      }

      _createMessage() {
        this.messageEl = document.createElement('div');
        this.messageEl.className = 'message assistant';
        this.messageEl.innerHTML = '<div class="avatar">AI</div><div class="content"></div>';
        output.appendChild(this.messageEl);
        this.contentEl = this.messageEl.querySelector('.content');
      }

      _flushMarkdown() {
        if (this.markdownBuffer.length === 0) return;
        const md = this.markdownBuffer.join('\n');
        if (!md.trim()) {
          this.markdownBuffer = [];
          return;
        }
        const html = marked.parse(md);
        const div = document.createElement('div');
        div.className = 'text';
        div.innerHTML = html;
        this.contentEl.appendChild(div);
        this.markdownBuffer = [];
      }

      onCardStart(type, id) {
        this._flushMarkdown();
        this.inCard = true;
        this.cardLines = [];
        this.currentCardContainer = document.createElement('div');
        this.currentCardContainer.className = 'card-preview';
        this.currentCardContainer.dataset.cardType = type;
        this.currentCardContainer.dataset.cardId = id;
        this.contentEl.appendChild(this.currentCardContainer);
      }

      onCardLine(card, line) {
        this.cardLines.push(line);
        const html = marked.parse(line);
        const div = document.createElement('div');
        div.className = 'card-line';
        div.innerHTML = html;
        this.currentCardContainer.appendChild(div);
      }

      onCardEnd(card, lines) {
        this.inCard = false;
        
        if (card.type === 'submit') {
          if (this.currentCardContainer) {
            this.currentCardContainer.remove();
            this.currentCardContainer = null;
          }
          return;
        }

        const data = Renderer.extractData(card, lines);
        const el = this._createCardElement(card, data);
        
        if (this.currentCardContainer) {
          this.currentCardContainer.replaceWith(el);
          this.currentCardContainer = null;
        }

        if (card.type === 'choice') {
          el.querySelectorAll('.option').forEach(opt => {
            opt.addEventListener('click', () => {
              el.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
              opt.classList.add('selected');
              collector.onChoiceSelect(card.id, opt.dataset.id);
            });
          });
        }
      }

      onMarkdownLine(line) {
        if (!this.inCard) {
          this.markdownBuffer.push(line);
        }
      }

      onSubmitCard(card) {
        this._flushMarkdown();
        const btn = document.createElement('button');
        btn.textContent = card.attrs.label || '提交';
        btn.style.cssText = 'background:linear-gradient(135deg,#667eea,#7c3aed);color:white;border:none;padding:12px 32px;border-radius:10px;cursor:pointer;font-size:15px;font-weight:500;margin:12px 0;transition:all 0.2s ease;';
        btn.addEventListener('click', () => {
          const { valid, errors } = collector.build(card.id, parser.pendingCards);
          if (!valid) {
            alert(`请完成所有必填项：${errors.join(', ')}`);
            return;
          }
          alert('提交成功！');
        });
        this.contentEl.appendChild(btn);
      }

      _createCardElement(card, data) {
        const el = document.createElement('div');
        el.className = `card card-${card.type}`;

        switch (card.type) {
          case 'choice':
            el.innerHTML = `<p><strong>${data.question}</strong></p>
              ${data.options.map(o => `<span class="option" data-id="${o.id}">${o.id}. ${o.label}</span>`).join('')}`;
            break;
          case 'tip':
            el.innerHTML = data.body.replace(/\n/g, '<br>');
            break;
          case 'progress':
            el.innerHTML = `<p><strong>${data.title}</strong> ${data.label}</p>
              <div class="bar"><div class="fill" style="width:${data.progress * 100}%"></div></div>`;
            break;
        }

        return el;
      }

      showCursor() {
        const cursor = document.createElement('span');
        cursor.className = 'cursor';
        this.contentEl.appendChild(cursor);
        return cursor;
      }
    }

    const renderer = new DOMRenderer();
    const parser = new Parser(renderer);

    const demoResponse = [
      '今天我们来学习 Python 的**可变类型**和**不可变类型**。',
      '',
      '<!-- card:choice:c1 -->',
      '下面哪个是可变类型？',
      '- A. 整数 int',
      '- B. 字符串 str',
      '- C. 列表 list',
      '- D. 元组 tuple',
      '<!-- /card -->',
      '',
      '<!-- card:tip:t1 -->',
      '> 💡 知识点：可变类型可以在原地修改，不可变类型每次修改都会创建新对象。',
      '<!-- /card -->',
      '',
      '<!-- card:progress:p1 -->',
      '**学习进度** 50% (1/2)',
      '<!-- /card -->',
      '',
      '<!-- card:submit:s1 -->',
      '提交答案',
      '<!-- /card -->',
    ];

    renderer._createMessage();
    const cursor = renderer.showCursor();

    const fullText = demoResponse.join('\n');
    let charIndex = 0;
    const typeSpeed = 30;
    let currentLine = '';

    function typeNext() {
      if (charIndex >= fullText.length) {
        if (currentLine) {
          parser.feed(currentLine);
        }
        renderer._flushMarkdown();
        cursor.remove();
        return;
      }

      const char = fullText[charIndex];

      if (char === '\n') {
        parser.feed(currentLine);
        currentLine = '';
      } else {
        currentLine += char;
      }

      charIndex++;
      output.scrollTop = output.scrollHeight;
      setTimeout(typeNext, typeSpeed);
    }

    setTimeout(typeNext, 500);

    window.sendMessage = function() {
      const input = document.getElementById('user-input');
      const text = input.value.trim();
      if (!text) return;
      
      const message = document.createElement('div');
      message.className = 'message user';
      message.innerHTML = '<div class="avatar">👤</div><div class="content"><div class="text">' + text + '</div></div>';
      output.appendChild(message);
      input.value = '';
    };
  </script>
</body>
</html>
