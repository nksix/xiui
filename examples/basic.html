<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>XIUI v3</title>
  <script src="https://cdn.jsdelivr.net/npm/markdown-it@14.1.0/dist/markdown-it.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <style>
    :root { --bg:#0f0f23; --bg2:#1a1a2e; --bg3:#16213e; --text:#e4e4e7; --mute:#a1a1aa; --accent:#667eea; --border:#27272a; }
    * { box-sizing: border-box; }
    body { font-family: -apple-system,sans-serif; margin:0; padding:0; background:var(--bg); color:var(--text); min-height:100vh; }
    .wrap { max-width:800px; margin:0 auto; padding:20px; }
    .bar { display:flex; align-items:center; gap:12px; padding:12px 16px; background:var(--bg2); border-radius:12px; margin-bottom:20px; border:1px solid var(--border); }
    .bar select { flex:1; padding:8px 12px; background:var(--bg3); border:1px solid var(--border); border-radius:8px; color:var(--text); font-size:14px; outline:none; }
    .bar select:focus { border-color:var(--accent); }
    .bar button { padding:8px 20px; background:var(--accent); color:#fff; border:none; border-radius:8px; cursor:pointer; font-size:14px; }
    .msg { display:flex; gap:12px; margin-bottom:16px; animation:in .3s ease; }
    @keyframes in { from{opacity:0;transform:translateY(5px)} }
    .avatar { width:36px; height:36px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:14px; background:linear-gradient(135deg,var(--accent),#7c3aed); color:#fff; }
    .bubble { flex:1; min-width:0; background:var(--bg2); padding:12px 16px; border-radius:0 16px 16px 16px; line-height:1.6; font-size:15px; }
    .bubble p { margin:0 0 8px; } .bubble p:last-child { margin:0; }
    .bubble pre { background:var(--bg); border-radius:8px; padding:12px; overflow-x:auto; }
    .bubble code { font-size:13px; }
    .bubble table { border-collapse:collapse; }
    .bubble th,.bubble td { padding:6px 12px; border:1px solid var(--border); }
    .bubble blockquote { border-left:3px solid var(--accent); margin:8px 0; padding:4px 12px; color:var(--mute); }

    .sk { display:flex; align-items:center; gap:12px; padding:20px; margin:12px 0; border:1px solid var(--border); border-radius:12px; opacity:.5; animation:pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:.8} }
    .sk-l { flex:1; height:12px; background:var(--border); border-radius:4px; }
    .pv { padding:12px 16px; margin:12px 0; border:1px dashed var(--border); border-radius:12px; line-height:1.6; font-size:14px; }
    .cursor { display:inline-block; width:2px; height:1.2em; background:var(--accent); vertical-align:text-bottom; animation:blink 1s step-end infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    .card { background:#1e1e2f; border:1px solid var(--border); border-radius:12px; padding:16px; margin:12px 0; }
    .card-choice .opt, .card-choice .opt-disabled { display:block; padding:10px 14px; margin:6px 0; border:1px solid var(--border); border-radius:8px; font-size:14px; }
    .card-choice .opt { cursor:pointer; transition:all .2s; }
    .card-choice .opt:hover { background:rgba(102,126,234,.1); border-color:var(--accent); }
    .card-choice .opt.sel { background:rgba(102,126,234,.15); border-color:var(--accent); }
    .card-tip { background:linear-gradient(135deg,rgba(102,126,234,.1),rgba(124,58,237,.1)); border-left:4px solid var(--accent); }
    .pbar { height:8px; background:var(--bg2); border-radius:4px; margin:8px 0; overflow:hidden; }
    .pfill { height:100%; background:linear-gradient(90deg,var(--accent),#7c3aed); border-radius:4px; transition:width .5s; }
    .card-input { width:100%; padding:12px 16px; border:1px solid var(--border); border-radius:12px; background:var(--bg3); color:var(--text); font-size:15px; outline:none; }
    .card-input:focus { border-color:var(--accent); }
    .sum-tbl { width:100%; border-collapse:collapse; }
    .sum-tbl td { padding:10px 12px; border-bottom:1px solid var(--border); }
    .sum-tbl tr:last-child td { border-bottom:none; }
    .bts { display:flex; gap:12px; margin-top:16px; }
    .btn-pri { flex:1; padding:12px 24px; background:var(--accent); color:#fff; border:none; border-radius:10px; cursor:pointer; font-size:15px; }
    .btn-ghost { flex:1; padding:12px 24px; background:var(--bg3); color:var(--mute); border:1px solid var(--border); border-radius:10px; cursor:pointer; font-size:15px; }
    .btn-submit { background:var(--accent); color:#fff; border:none; padding:12px 32px; border-radius:10px; cursor:pointer; font-size:15px; margin:12px 0; }
    .disabled { pointer-events:none; opacity:.5; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="bar">
      <select id="ds">
        <option value="basic">基础</option><option value="math">公式</option><option value="multiple">多卡片</option>
        <option value="form">表单</option><option value="slider">滑块</option><option value="switch">开关</option><option value="confirm">确认</option>
        <option value="complex">复杂</option>
      </select>
      <button onclick="run()">加载</button>
    </div>
    <div id="chat"></div>
  </div>
  <script type="module">
    import { XIUIChat, XIUIPlugin } from '../src/index.js';

    const chatEl = document.getElementById('chat');
    const md = markdownit({ html: true, breaks: true });
    function mkmd(t) {
      let h = md.render(t);
      h = h.replace(/\$\$(.+?)\$\$/g, (_,f) => { try { const s=document.createElement('span'); katex.render(f.trim(),s,{throwOnError:false}); return s.innerHTML; } catch { return `<code>${f}</code>`; } });
      return h.trim();
    }
    const noP = s => mkmd(s).replace(/<\/?p>/g,'');

    let chat, bubble, cursor, skeleton, preview;

    const cardDefs = {
      choice: {
        render(card, el) {
          const d = card.data || {};
          el.innerHTML = mkmd(d.question || '') + (d.options || []).map(o =>
            `<span class="opt" data-id="${o.id}">${o.id}. ${noP(o.label)}</span>`).join('');
          el.querySelectorAll('.opt').forEach(o => o.onclick = () => {
            if (chat.isSubmitted()) return;
            el.querySelectorAll('.opt').forEach(x => x.classList.remove('sel'));
            o.classList.add('sel');
            card.setValue(o.dataset.id);
          });
        },
        event(card, type, detail) {
          console.log(`[choice] ${card.id}`, detail);
        }
      },
      tip: {
        render(card, el) { el.innerHTML = mkmd((card.data||{}).body||''); }
      },
      progress: {
        render(card, el) {
          const d = card.data||{};
          el.innerHTML = `${mkmd((d.title||'')+' '+(d.label||''))}<div class="pbar"><div class="pfill" style="width:${(d.progress||0)*100}%"></div></div>`;
        }
      },
      input: {
        render(card, el) {
          const d = card.data||{};
          el.innerHTML = `${mkmd(d.title||'')}<input class="card-input" placeholder="${d.placeholder||''}">`;
          el.querySelector('input').oninput = e => card.setValue(e.target.value);
        }
      },
      submit: {
        render(card, el) {
          el.innerHTML = `<button class="btn-submit">${(card.data||{}).label||'提交'}</button>`;
          el.querySelector('button').onclick = () => {
            if (chat.isSubmitted()) return;
            const result = chat.submit();
            if (!result.success) {
              if (result.error === 'incomplete') {
                alert(`请完成所有题目（未完成：${result.missing.join(', ')}）`);
              }
              return;
            }
            alert(JSON.stringify(result.data,null,2));
            bubble.querySelectorAll('.opt,.btn-submit,.btn-pri,.btn-ghost,.card-input').forEach(x => x.classList.add('disabled'));
          };
        }
      },
      slider: {
        render(card, el) {
          const d = card.data || {};
          el.innerHTML = `<div class="slider-wrap"><label>${d.title}</label><input type="range" min="${d.min}" max="${d.max}" step="${d.step}" value="${d.value}" class="sld" /><span class="sld-val">${d.value}</span></div>`;
          const input = el.querySelector('input');
          const span = el.querySelector('.sld-val');
          input.oninput = () => { span.textContent = input.value; card.setValue(String(input.value)); };
          card.setValue(String(d.value));
        }
      },
      switch: {
        render(card, el) {
          const d = card.data || {};
          el.innerHTML = `<div class="switch-wrap"><label>${d.title}</label><input type="checkbox" class="chk" ${d.value ? 'checked' : ''} /><span class="chk-label">${d.value ? '开启' : '关闭'}</span></div>`;
          const input = el.querySelector('input');
          const span = el.querySelector('.chk-label');
          input.onchange = () => { const v = String(input.checked); span.textContent = v === 'true' ? '开启' : '关闭'; card.setValue(v); };
          card.setValue(String(d.value));
        }
      },
      confirm: {
        render(card, el) {
          const d = card.data||{};
          el.innerHTML = `${mkmd(d.title||'')}${mkmd(d.description||'')}<div class="bts"><button class="btn-pri">${d.confirmLabel||'确认'}</button><button class="btn-ghost">${d.cancelLabel||'取消'}</button></div>`;
          el.querySelector('.btn-pri').onclick = () => card.setValue('confirm');
          el.querySelector('.btn-ghost').onclick = () => card.setValue('cancel');
        }
      }
    };

    window.run = () => {
      const key = document.getElementById('ds').value, lines = datasets[key];
      if (!lines) return;
      chatEl.innerHTML = '';

      const msg = document.createElement('div'); msg.className = 'msg';
      msg.innerHTML = '<div class="avatar">AI</div><div class="bubble"></div>';
      chatEl.appendChild(msg);
      bubble = msg.querySelector('.bubble');
      skeleton = preview = null;
      cursor = document.createElement('span'); cursor.className = 'cursor'; bubble.appendChild(cursor);

      chat = new XIUIChat({
        cards: cardDefs,
        onText: t => {
          let tb = bubble.querySelector('.text-block');
          if (!tb) { tb = document.createElement('div'); tb.className = 'text-block'; bubble.insertBefore(tb, cursor); }
          tb.innerHTML = mkmd(t); chatEl.scrollTop = chatEl.scrollHeight;
        },
        onCardBegin: () => {
          if (preview) { preview.remove(); preview = null; }
          skeleton = document.createElement('div'); skeleton.className = 'sk'; skeleton.innerHTML = '<div class="sk-l"></div>';
          bubble.insertBefore(skeleton, cursor);
          preview = document.createElement('div'); preview.className = 'pv'; preview.style.display = 'none';
          bubble.insertBefore(preview, cursor);
        },
        onCardUpdate: t => {
          if (!t.trim()||!preview) return;
          preview.style.display = ''; preview.innerHTML = mkmd(t); chatEl.scrollTop = chatEl.scrollHeight;
        },
        onCard: (card, el) => {
          if (skeleton) { skeleton.remove(); skeleton = null; }
          if (preview) { preview.remove(); preview = null; }
          bubble.insertBefore(el, cursor); chatEl.scrollTop = chatEl.scrollHeight;
        },
        onDone: () => {
          if (cursor) cursor.remove(); if (skeleton) skeleton.remove(); if (preview) preview.remove();
        },
        onEvent: (card, type, detail) => {
          console.log(`[Event] ${card.id} :: ${type}`, detail);
        }
      });

      let i = 0; const text = lines.join('\n');
      const tick = () => { if (i>=text.length) return; chat.feed(text[i]); i++; setTimeout(tick, 25); };
      tick();
    };

    const datasets = {
      basic: ['今天学习 **可变类型** 和 **不可变类型**。','','```xiui@form:choice:c1','哪个是可变类型？','- A. 整数 int $$ a^2+b^2=c^2 $$','- B. 字符串 str','- C. 列表 list','- D. 元组 tuple','```','','```xiui@form:slider:sl1','学习强度','1-10-1-5','```','','```xiui@form:submit:s1','提交答案','```'],
      math: ['常用数学公式：','','**二次求根：** $$ x = \\frac{-b \\pm \\sqrt{b^2-4ac}}{2a} $$','','**勾股定理：** $$ a^2 + b^2 = c^2 $$','','```xiui@form:choice:m1','方程 $$x^2+2x+1=0$$ 的解？','- A. $$x=1$$','- B. $$x=-1$$','- C. $$x=\\pm 1$$','- D. 无解','```','','```xiui@form:submit:ms','提交','```'],
      multiple: ['综合测试：','','```xiui@form:choice:q1','HTML 缩写？','- A. HyperText Markup Language','- B. HighTech Modern Language','- C. HyperText Management Language','- D. High Tech Markup Language','```','','```xiui@form:choice:q2','CSS 缩写？','- A. Computer Style Sheets','- B. Creative Style System','- C. Cascading Style Sheets','- D. Colorful Style Sheets','```','','```xiui@form:choice:q3','JS 类型？','- A. 编译型','- B. 解释型','- C. 静态类型','- D. 强类型','```','','```xiui@form:submit:ms2','提交','```'],
      form: ['填写表单：','','```xiui@form:input:name','姓名','*(真实姓名)*','```','','```xiui@form:input:email','邮箱','*(有效邮箱)*','```','','```xiui@form:choice:gender','性别','- A. 男','- B. 女','- C. 其他','```','','```xiui@form:submit:fs','提交','```'],
      slider: ['系统设置：','','```xiui@form:slider:sl1','音量','0-100-1-70','```','','```xiui@form:slider:sl2','亮度','0-100-1-50','```','','```xiui@form:submit:sb','保存','```'],
      switch: ['通知设置：','','```xiui@form:switch:sw1','每日提醒','true','```','','```xiui@form:switch:sw2','邮件通知','false','```','','```xiui@form:submit:sd','保存','```'],
      confirm: ['即将提交：','','```xiui@form:confirm:cf','**确认提交？**','提交后无法修改','> 确认 | 取消','```'],
      complex: ['综合配置：','','```xiui@form:choice:cq','Python 安装命令？','- A. `npm install python`','- B. `pip install python`','- C. `apt-get install python3`','- D. `brew install python`','```','','```xiui@form:slider:sl3','难度','1-5-1-3','```','','```xiui@form:switch:sw3','开启提示','true','```','','```xiui@form:submit:cs','提交','```']
    };
    run();
  </script>
</body>
</html>
