<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>XIUI 基础示例</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <style>
    :root {
      --bg-primary: #0f0f23;
      --bg-secondary: #1a1a2e;
      --bg-tertiary: #16213e;
      --text-primary: #e4e4e7;
      --text-secondary: #a1a1aa;
      --accent: #667eea;
      --accent-hover: #7c8eea;
      --border: #27272a;
      --card-bg: #1e1e2f;
    }

    * { box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 20px;
    }

    .header .logo {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--accent), #7c3aed);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: bold;
      color: white;
    }

    .header h1 {
      margin: 0;
      font-size: 20px;
      font-weight: 600;
    }

    .header .badge {
      margin-left: auto;
      padding: 4px 12px;
      background: var(--bg-tertiary);
      border-radius: 20px;
      font-size: 12px;
      color: var(--text-secondary);
    }

    #output {
      flex: 1;
      overflow-y: auto;
      padding: 10px 0;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    #output::-webkit-scrollbar { width: 6px; }
    #output::-webkit-scrollbar-track { background: transparent; }
    #output::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .message {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

    .message .avatar {
      width: 36px;
      height: 36px;
      border-radius: 9999px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .message.assistant .avatar {
      background: linear-gradient(135deg, var(--accent), #7c3aed);
      color: white;
    }

    .message.user .avatar {
      background: var(--bg-tertiary);
      color: var(--text-secondary);
    }

    .message .content {
      flex: 1;
      min-width: 0;
    }

    .message .text {
      padding: 12px 16px;
      border-radius: 16px;
      line-height: 1.6;
      font-size: 15px;
    }

    .message.assistant .text {
      background: var(--bg-secondary);
      border-radius: 0 16px 16px 16px;
    }

    .message.user .text {
      background: var(--accent);
      color: white;
      border-radius: 16px 0 16px 16px;
      margin-left: auto;
      max-width: 80%;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      margin: 12px 0;
      transition: all 0.2s ease;
    }

    .card:hover { border-color: var(--accent); }

    .card-choice .option {
      display: block;
      padding: 10px 14px;
      margin: 6px 0;
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
      font-size: 14px;
    }

    .card-choice .option:hover {
      background: rgba(102, 126, 234, 0.1);
      border-color: rgba(102, 126, 234, 0.3);
    }

    .card-choice .option.selected {
      background: rgba(102, 126, 234, 0.15);
      border-color: var(--accent);
    }

    .card-tip {
      background: linear-gradient(135deg, rgba(102, 126, 234, 0.1), rgba(124, 58, 237, 0.1));
      border-left: 4px solid var(--accent);
      padding-left: 20px;
    }

    .card-submit button {
      background: linear-gradient(135deg, var(--accent), #7c3aed);
      color: white;
      border: none;
      padding: 12px 32px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 500;
      transition: all 0.2s ease;
    }

    .card-submit button:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
    }

    .card-progress .bar {
      height: 8px;
      background: var(--bg-secondary);
      border-radius: 4px;
      margin: 8px 0;
      overflow: hidden;
    }

    .card-progress .fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), #7c3aed);
      border-radius: 4px;
      transition: width 0.5s ease;
    }

    .card-preview {
      background: var(--card-bg);
      border: 1px dashed var(--border);
      border-radius: 12px;
      padding: 16px;
      margin: 12px 0;
      transition: all 0.3s ease;
    }

    .card-preview .card-line {
      line-height: 1.6;
      margin-bottom: 4px;
      opacity: 0.8;
    }

    #dataset-selector {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: var(--bg-secondary);
      border-radius: 12px;
      margin-bottom: 20px;
      border: 1px solid var(--border);
    }

    #dataset-selector label {
      font-size: 14px;
      color: var(--text-secondary);
    }

    #dataset-selector select {
      flex: 1;
      padding: 8px 12px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      font-size: 14px;
      outline: none;
    }

    #dataset-selector select:focus { border-color: var(--accent); }

    #dataset-selector button {
      padding: 8px 20px;
      background: linear-gradient(135deg, var(--accent), #7c3aed);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s ease;
    }

    #dataset-selector button:hover {
      transform: translateY(-1px);
      box-shadow: 0 2px 8px rgba(102, 126, 234, 0.3);
    }

    .card-input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--bg-tertiary);
      color: var(--text-primary);
      font-size: 15px;
      outline: none;
    }

    .card-input:focus { border-color: var(--accent); }
    .card-input::placeholder { color: var(--text-secondary); }

    .summary-table {
      width: 100%;
      border-collapse: collapse;
    }

    .summary-table td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
    }

    .summary-table tr:last-child td {
      border-bottom: none;
    }

    .confirm-buttons {
      display: flex;
      gap: 12px;
      margin-top: 16px;
    }

    .btn-confirm {
      flex: 1;
      padding: 12px 24px;
      background: linear-gradient(135deg, var(--accent), #7c3aed);
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 500;
      transition: all 0.2s ease;
    }

    .btn-cancel {
      flex: 1;
      padding: 12px 24px;
      background: var(--bg-tertiary);
      color: var(--text-secondary);
      border: 1px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 500;
      transition: all 0.2s ease;
    }

    .btn-confirm:hover {
      transform: translateY(-1px);
      box-shadow: 0 2px 8px rgba(102, 126, 234, 0.3);
    }

    .btn-cancel:hover {
      background: var(--bg-secondary);
      border-color: var(--accent);
    }

    .cursor {
      display: inline-block;
      width: 2px;
      height: 1.2em;
      background: var(--accent);
      vertical-align: text-bottom;
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">X</div>
      <h1>XIUI 基础示例</h1>
      <span class="badge">v1.0.0</span>
    </div>
    
    <div id="dataset-selector">
      <label>选择测试数据集：</label>
      <select id="dataset-select" value="basic">
        <option value="basic" selected>基础示例</option>
        <option value="math">数学公式</option>
        <option value="multiple">多卡片组合</option>
        <option value="form">表单输入</option>
        <option value="summary">总结卡片</option>
        <option value="confirm">确认弹窗</option>
      </select>
      <button onclick="loadDataset()">加载</button>
    </div>
    
    <div id="output"></div>
  </div>

  <script type="module">
    import { Parser, Renderer, Collector } from '../src/index.js';

    const output = document.getElementById('output');
    const collector = new Collector();

    class DOMRenderer extends Renderer {
      constructor() {
        super();
        this.messageEl = null;
        this.contentEl = null;
        this.markdownBuffer = [];
        this.inCard = false;
        this.currentCardContainer = null;
        this.cardLines = [];
      }

      _createMessage() {
        this.messageEl = document.createElement('div');
        this.messageEl.className = 'message assistant';
        this.messageEl.innerHTML = '<div class="avatar">AI</div><div class="content"></div>';
        output.appendChild(this.messageEl);
        this.contentEl = this.messageEl.querySelector('.content');
      }

      _flushMarkdown() {
        if (this.markdownBuffer.length === 0) return;
        const md = this.markdownBuffer.join('\n');
        if (!md.trim()) {
          this.markdownBuffer = [];
          return;
        }
        let html = marked.parse(md);
        html = html.replace(/\$\$(.*?)\$\$/g, (_, formula) => {
          try {
            const span = document.createElement('span');
            katex.render(formula.trim(), span, { throwOnError: false });
            return span.innerHTML;
          } catch (e) {
            return `<code>${formula}</code>`;
          }
        });
        const div = document.createElement('div');
        div.className = 'text';
        div.innerHTML = html;
        this.contentEl.appendChild(div);
        this.markdownBuffer = [];
      }

      onCardStart(type, id) {
        this._flushMarkdown();
        this.inCard = true;
        this.cardLines = [];
        this.currentCardContainer = document.createElement('div');
        this.currentCardContainer.className = 'card-preview';
        this.currentCardContainer.dataset.cardType = type;
        this.currentCardContainer.dataset.cardId = id;
        this.contentEl.appendChild(this.currentCardContainer);
      }

      onCardLine(card, line) {
        this.cardLines.push(line);
        let html = marked.parse(line);
        html = html.replace(/\$\$(.*?)\$\$/g, (_, formula) => {
          try {
            const span = document.createElement('span');
            katex.render(formula.trim(), span, { throwOnError: false });
            return span.innerHTML;
          } catch (e) {
            return `<code>${formula}</code>`;
          }
        });
        const div = document.createElement('div');
        div.className = 'card-line';
        div.innerHTML = html;
        this.currentCardContainer.appendChild(div);
      }

      onCardEnd(card, lines) {
        this.inCard = false;
        
        if (card.type === 'submit') {
          if (this.currentCardContainer) {
            this.currentCardContainer.remove();
            this.currentCardContainer = null;
          }
          return;
        }

        const data = Renderer.extractData(card, lines);
        const el = this._createCardElement(card, data, lines);
        
        if (this.currentCardContainer) {
          this.currentCardContainer.replaceWith(el);
          this.currentCardContainer = null;
        }

        if (card.type === 'choice') {
          el.querySelectorAll('.option').forEach(opt => {
            opt.addEventListener('click', () => {
              el.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
              opt.classList.add('selected');
              collector.onChoiceSelect(card.id, opt.dataset.id);
            });
          });
        }
      }

      onMarkdownLine(line) {
        if (!this.inCard) {
          this.markdownBuffer.push(line);
        }
      }

      onSubmitCard(card) {
        this._flushMarkdown();
        const btn = document.createElement('button');
        btn.textContent = card.attrs.label || '提交';
        btn.style.cssText = 'background:linear-gradient(135deg,#667eea,#7c3aed);color:white;border:none;padding:12px 32px;border-radius:10px;cursor:pointer;font-size:15px;font-weight:500;margin:12px 0;transition:all 0.2s ease;';
        btn.addEventListener('click', () => {
          const { valid, errors } = collector.build(card.id, parser.pendingCards);
          if (!valid) {
            alert(`请完成所有必填项：${errors.join(', ')}`);
            return;
          }
          alert('提交成功！');
        });
        this.contentEl.appendChild(btn);
      }

      _createCardElement(card, data, lines) {
        const el = document.createElement('div');
        el.className = `card card-${card.type}`;

        switch (card.type) {
          case 'choice':
            el.innerHTML = `<p><strong>${data.question}</strong></p>
              ${data.options.map(o => `<span class="option" data-id="${o.id}">${o.id}. ${o.label}</span>`).join('')}`;
            break;
          case 'tip':
            el.innerHTML = data.body.replace(/\n/g, '<br>');
            break;
          case 'progress':
            el.innerHTML = `<p><strong>${data.title}</strong> ${data.label}</p>
              <div class="bar"><div class="fill" style="width:${data.progress * 100}%"></div></div>`;
            break;
          case 'input':
            el.innerHTML = `<p><strong>${data.title}</strong></p>
              <input type="text" class="card-input" placeholder="${data.placeholder || ''}" data-card-id="${card.id}">`;
            break;
          case 'summary':
            const summaryRows = lines.filter(l => l.startsWith('|'));
            const summaryHtml = summaryRows.map(row => {
              const cells = row.split('|').filter(Boolean).map(c => `<td>${c.trim()}</td>`).join('');
              return `<tr>${cells}</tr>`;
            }).join('');
            el.innerHTML = `<table class="summary-table">${summaryHtml}</table>`;
            break;
          case 'confirm':
            el.innerHTML = `<p><strong>${data.title}</strong></p>
              <p>${data.description}</p>
              <div class="confirm-buttons">
                <button class="btn-confirm">${data.confirmLabel || '确认'}</button>
                <button class="btn-cancel">${data.cancelLabel || '取消'}</button>
              </div>`;
            break;
          default:
            el.innerHTML = `<p>${lines.join('<br>')}</p>`;
            break;
        }

        return el;
      }

      showCursor() {
        const cursor = document.createElement('span');
        cursor.className = 'cursor';
        this.contentEl.appendChild(cursor);
        return cursor;
      }
    }

    let renderer = new DOMRenderer();
    let parser = new Parser(renderer);

    const datasets = {
      basic: [
        '今天我们来学习 Python 的**可变类型**和**不可变类型**。',
        '',
        '<!-- card:choice:c1 -->',
        '下面哪个是可变类型？',
        '- A. 整数 int',
        '- B. 字符串 str',
        '- C. 列表 list',
        '- D. 元组 tuple',
        '<!-- /card -->',
        '',
        '<!-- card:tip:t1 -->',
        '> 💡 知识点：可变类型可以在原地修改，不可变类型每次修改都会创建新对象。',
        '<!-- /card -->',
        '',
        '<!-- card:progress:p1 -->',
        '**学习进度** 50% (1/2)',
        '<!-- /card -->',
        '',
        '<!-- card:submit:s1 -->',
        '提交答案',
        '<!-- /card -->',
      ],
      math: [
        '下面是一些常用的数学公式：',
        '',
        '**二次方程求根公式：**',
        '$$ x = \\frac{-b \\pm \\sqrt{b^2-4ac}}{2a} $$',
        '',
        '**勾股定理：**',
        '$$ a^2 + b^2 = c^2 $$',
        '',
        '**微积分基本定理：**',
        '$$ \\int_a^b f(x)dx = F(b) - F(a) $$',
        '',
        '<!-- card:choice:math1 -->',
        '如果 a=1, b=2, c=1，方程 x²+2x+1=0 的解是？',
        '- A. x=1',
        '- B. x=-1',
        '- C. x=±1',
        '- D. 无解',
        '<!-- /card -->',
        '',
        '<!-- card:tip:math_tip -->',
        '> 💡 判别式 Δ = b² - 4ac，当 Δ=0 时方程有唯一解。',
        '<!-- /card -->',
        '',
        '<!-- card:submit:math_submit -->',
        '提交答案',
        '<!-- /card -->',
      ],
      multiple: [
        '欢迎来到综合测试！',
        '',
        '<!-- card:choice:q1 -->',
        '问题1：HTML 是什么的缩写？',
        '- A. HyperText Markup Language',
        '- B. HighTech Modern Language',
        '- C. HyperText Management Language',
        '- D. High Tech Markup Language',
        '<!-- /card -->',
        '',
        '<!-- card:choice:q2 -->',
        '问题2：CSS 是什么的缩写？',
        '- A. Computer Style Sheets',
        '- B. Creative Style System',
        '- C. Cascading Style Sheets',
        '- D. Colorful Style Sheets',
        '<!-- /card -->',
        '',
        '<!-- card:choice:q3 -->',
        '问题3：JavaScript 是什么类型的语言？',
        '- A. 编译型',
        '- B. 解释型',
        '- C. 静态类型',
        '- D. 强类型',
        '<!-- /card -->',
        '',
        '<!-- card:tip:multi_tip -->',
        '> 💡 提示：这三个问题都和 Web 前端开发有关。',
        '<!-- /card -->',
        '',
        '<!-- card:progress:multi_progress -->',
        '**测试进度** 100% (3/3)',
        '<!-- /card -->',
        '',
        '<!-- card:submit:multi_submit -->',
        '提交所有答案',
        '<!-- /card -->',
      ],
      form: [
        '请填写以下表单信息：',
        '',
        '<!-- card:input:name -->',
        '您的姓名',
        '*(请输入您的真实姓名)*',
        '<!-- /card -->',
        '',
        '<!-- card:input:email -->',
        '电子邮箱',
        '*(请输入有效的邮箱地址)*',
        '<!-- /card -->',
        '',
        '<!-- card:choice:gender -->',
        '性别',
        '- A. 男',
        '- B. 女',
        '- C. 其他',
        '<!-- /card -->',
        '',
        '<!-- card:tip:form_tip -->',
        '> 💡 所有字段均为必填项，请确保信息准确。',
        '<!-- /card -->',
        '',
        '<!-- card:submit:form_submit -->',
        '提交表单',
        '<!-- /card -->',
      ],
      summary: [
        '学习成果总结',
        '',
        '<!-- card:summary:s1 -->',
        '| 学习时长 | 2小时 |',
        '| 掌握知识点 | 5个 |',
        '<!-- /card -->',
        '',
        '<!-- card:summary:s2 -->',
        '| 正确率 | 80% |',
        '| 排名 | 第5名 |',
        '<!-- /card -->',
        '',
        '恭喜你完成了本次学习！',
      ],
      confirm: [
        '您即将提交答案，请确认：',
        '',
        '<!-- card:confirm:confirm1 -->',
        '**确认提交？**',
        '提交后将无法修改答案',
        '> 确认 | 取消',
        '<!-- /card -->',
      ],
    };

    function startStreaming(response) {
      output.innerHTML = '';
      renderer = new DOMRenderer();
      parser = new Parser(renderer);

      renderer._createMessage();
      const cursor = renderer.showCursor();

      const fullText = response.join('\n');
      let charIndex = 0;
      const typeSpeed = 30;
      let currentLine = '';

      function typeNext() {
        if (charIndex >= fullText.length) {
          if (currentLine) {
            parser.feed(currentLine);
          }
          renderer._flushMarkdown();
          cursor.remove();
          return;
        }

        const char = fullText[charIndex];

        if (char === '\n') {
          parser.feed(currentLine);
          currentLine = '';
        } else {
          currentLine += char;
        }

        charIndex++;
        output.scrollTop = output.scrollHeight;
        setTimeout(typeNext, typeSpeed);
      }

      setTimeout(typeNext, 500);
    }

    window.loadDataset = function() {
      const select = document.getElementById('dataset-select');
      const key = select.value;
      if (datasets[key]) {
        startStreaming(datasets[key]);
      }
    };

    startStreaming(datasets.basic);
  </script>
</body>
</html>
